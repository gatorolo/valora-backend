spring.application.name=gestion
server.port=${PORT:8080}

# Base de Datos (Variables de entorno para Render/Producción con fallbacks locales H2)
# Si no hay SPRING_DATASOURCE_URL, usamos H2 en memoria para que el backend arranque siempre
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:valora;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (Accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
